name: Update Google News Sitemap

on:
  schedule:
    - cron: '30 * * * *'
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-sitemap:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install feedparser google-api-python-client google-auth requests

      # ✅ Génération sitemap
      - name: Generate Sitemap
        run: python generate_sitemap.py

      # ⚡ Indexation intelligente
      - name: Submit Sitemap + Indexing API
        env:
          GSC_JSON_KEY: ${{ secrets.GSC_JSON_KEY }}
        run: python index_news.py

      # ✅ Commit si changement
      - name: Commit and Push changes
        id: commit_step
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/newssitemap.xml

          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Aucun changement détecté."
          else
            git commit -m "auto: mise à jour sitemap Google News"
            git pull --rebase origin main
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # ⚡ Ping Google
      - name: Ping Google (FAST)
        if: steps.commit_step.outputs.changed == 'true'
        run: |
          curl "https://www.google.com/ping?sitemap=https://www.sevillava.fr/newssitemap.xml"
          curl "https://www.google.com/ping?sitemap=https://www.sevillava.fr/sitemap.xml"
          curl "https://www.google.com/ping?sitemap=https://news.sevillava.fr/newssitemap.xml"

      # ⚡ Ping Bing
      - name: Ping Bing
        if: steps.commit_step.outputs.changed == 'true'
        run: |
          curl "https://www.bing.com/ping?sitemap=https://www.sevillava.fr/newssitemap.xml"

      # ✅ Soft crawl (REMPLACE le force crawl)
      - name: Soft crawl trigger (light)
        run: |
          curl -s https://www.sevillava.fr/ > /dev/null
