name: Update Google News Sitemap

# Cette variable supprime l'avertissement Node.js 20
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '30 * * * *'
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      title:
        description: 'Titre de l article'
      url:
        description: 'URL de l article'
      date:
        description: 'Date ISO'
  repository_dispatch:
    types: [publish-event]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 1. Generate Sitemap
        env:
          INPUT_TITLE: "${{ github.event.client_payload.title || github.event.inputs.title }}"
          INPUT_URL: "${{ github.event.client_payload.url || github.event.inputs.url }}"
          INPUT_DATE: "${{ github.event.client_payload.date || github.event.inputs.date }}"
        run: python generate_sitemap.py

      - name: 2. Commit and Push Sitemap changes
        id: commit_step
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Aucun changement détecté."
          else
            git commit -m "Auto: Mise à jour sitemap"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: 3. Submit to Google Indexing API
        env:
          GSC_JSON_KEY: ${{ secrets.GSC_JSON_KEY }}
          INPUT_URL: "${{ github.event.client_payload.url || github.event.inputs.url }}"
        run: |
          if [ -f index_news.py ]; then
            python index_news.py
          fi

      - name: 4. Ping Search Engines
        if: steps.commit_step.outputs.changed == 'true'
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://www.sevillava.fr/newssitemap.xml"
          curl -s "https://www.bing.com/ping?sitemap=https://www.sevillava.fr/newssitemap.xml"

      # --- LES DEUX ÉTAPES QUI RÉGLENT LE PROBLÈME JEKYLL ---
      - name: 5. Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs  # Indique à GitHub de prendre le contenu du dossier docs

      - name: 6. Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
