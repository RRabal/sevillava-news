name: Update Google News Sitemap

on:
  schedule:
    - cron: '30 * * * *'
  push:
    branches:
      - main
    paths:
      - 'generate_sitemap.py'
      - 'index_news.py'
      - 'requirements.txt'
      - '.github/workflows/update_sitemap.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: sitemap-update-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  update-sitemap:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Wait for Pages to settle
        if: github.event_name == 'push'
        run: sleep 30

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Sitemap
        run: python generate_sitemap.py

      - name: Submit Sitemap + Indexing API
        env:
          GSC_JSON_KEY: ${{ secrets.GSC_JSON_KEY }}
        run: python index_news.py

      - name: Commit and Push changes
        id: commit_step
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/newssitemap.xml
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Aucun changement detecte."
          else
            git commit -m "auto: mise a jour sitemap Google News [skip ci]"
            git pull --rebase origin main
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Ping Google
        if: steps.commit_step.outputs.changed == 'true'
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://www.sevillava.fr/newssitemap.xml"
          curl -s "https://www.google.com/ping?sitemap=https://www.sevillava.fr/sitemap.xml"

      - name: Ping Bing
        if: steps.commit_step.outputs.changed == 'true'
        run: |
          curl -s "https://www.bing.com/ping?sitemap=https://www.sevillava.fr/newssitemap.xml"

      - name: Soft crawl trigger
        run: curl -s https://www.sevillava.fr/ > /dev/null
