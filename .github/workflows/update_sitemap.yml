name: Update Google News Sitemap

on:
  schedule:
    - cron: '30 * * * *'
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-sitemap:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install feedparser google-api-python-client google-auth requests

      - name: Run SEO Workflow (Sitemap + Indexing)
        env:
          GSC_JSON_KEY: ${{ secrets.GSC_JSON_KEY }}
        run: |
          echo "::group::Exécution du Workflow Python"
          python main.py
          echo "::endgroup::"

      - name: Commit and Push changes
        id: commit_step
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/newssitemap.xml
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Aucun changement détecté."
          else
            git commit -m "auto: mise à jour sitemap Google News"
            git pull --rebase origin main
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Ping Bing
        if: steps.commit_step.outputs.changed == 'true'
        run: |
          echo "::group::Notification Bing"
          curl -I "https://www.bing.com/ping?sitemap=https://news.sevillava.fr/newssitemap.xml"
          echo "::endgroup::"

      - name: Ping Google
        if: steps.commit_step.outputs.changed == 'true'
        run: |
          echo "::group::Notification Google"
          curl -I "https://www.google.com/ping?sitemap=https://news.sevillava.fr/newssitemap.xml"
          echo "::endgroup::"
